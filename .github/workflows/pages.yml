# Static-export PREVIEW on GitHub Pages (romanos2408.github.io/garyfalia-customs-web).
# No server: src/app/api is stripped before the build, so the commission form
# renders but cannot submit here. Production deploys go to Vercel instead.
name: pages-preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Strip the server-only API route (static preview has no backend)
        run: rm -rf src/app/api
      - run: npm run build
        env:
          DEPLOY_TARGET: pages
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
